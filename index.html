<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendCart - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center">
<div style="position: absolute; top: 15px; right: 20px;">
  <li class="nav-item">
    <button id="darkModeBtn" class="btn btn-sm btn-dark" onclick="toggleDarkMode()">
        🌙 Dark Mode
    </button>
</li>
</div>
    <div class="container d-flex justify-content-center p-4">
        <div class="login-box w-100" style="max-width: 450px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold" style="color: var(--primary-accent);">TrendCart</h2>
                <p class="text-muted">Modern Fashion & Gadget Platform</p>
            </div>

            <div id="errorMsg" class="alert alert-danger d-none" role="alert">
                Invalid Email or Password!
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="izzat12@gmail.com"  autocomplete="email" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="12345" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2">Sign In</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="dashboard.html" class="text-decoration-none" style="color: var(--primary-accent);">Create an account? Register here</a>
            </div>
        </div>
    </div>

    <script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    if(email === "izzat12@gmail.com" && pass === "12345") {
        errorMsg.classList.add('d-none');
        window.location.href = "dashboard.html";
    } else {
        errorMsg.classList.remove('d-none');
    }
});
</script>
<script>
function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');

    const btn = document.getElementById('darkModeBtn');

    // Save mode
    if(document.body.classList.contains('dark-mode')) {
        localStorage.setItem('darkMode', 'enabled');
        btn.innerHTML = '☀️ Light Mode';
    } else {
        localStorage.setItem('darkMode', 'disabled');
        btn.innerHTML = '🌙 Dark Mode';
    }
}

// Load saved mode
window.onload = function () {
    const btn = document.getElementById('darkModeBtn');

    if(localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
        btn.innerHTML = '☀️ Light Mode';
    } else {
        btn.innerHTML = '🌙 Dark Mode';
    }
}
</script>
</body>
</html>
